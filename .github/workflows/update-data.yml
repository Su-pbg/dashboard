name: update-data

on:
  schedule:
    - cron: '0 21 * * *'    # 매일 KST 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci

      - name: Fetch GA4 data (all presets)
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA_SA_KEY:       ${{ secrets.GA_SA_KEY }}
          SHOP_NAME:       ${{ vars.SHOP_NAME }}
          RENEWAL_DATE:    ${{ vars.RENEWAL_DATE }}
        run: node scripts/fetch-data.mjs
      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update data.json"
          git push
