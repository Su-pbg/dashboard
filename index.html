<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintBakery 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F4F6F9;--surface:#FFFFFF;--ink:#172230;--muted:#66768A;--hair:#E4E9F0;
    --accent:#0E7C6E;--accent-soft:#E3F1EE;--ghost:#D8DEE7;--up:#1E9C68;--down:#C85A3F;
    --up-soft:#E6F4EC;--down-soft:#FBEAE4;--mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'Pretendard',system-ui,sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1080px;margin:0 auto;padding:36px 24px 80px;}
  .top-rule{height:3px;background:var(--accent);border-radius:2px;width:56px;margin-bottom:20px;}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:0 0 8px;}
  h1{font-size:30px;font-weight:700;margin:0 0 20px;letter-spacing:-.01em;}
  /* 탭 */
  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--hair);margin-bottom:24px;}
  .tab{padding:11px 18px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border:0;background:none;
    border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  /* 컨트롤바(달력) */
  .controls{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;background:var(--surface);border:1px solid var(--hair);
    border-radius:12px;padding:16px 18px;margin-bottom:24px;}
  .ctrl{display:flex;flex-direction:column;gap:5px;}
  .ctrl label{font-size:11px;color:var(--muted);font-weight:600;}
  .ctrl .pair{display:flex;gap:6px;align-items:center;}
  input[type=date]{font-family:var(--mono);font-size:13px;border:1px solid var(--hair);border-radius:8px;padding:7px 10px;color:var(--ink);}
  .seg{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;}
  .seg.b{background:var(--paper);color:var(--muted);}
  .seg.a{background:var(--accent-soft);color:var(--accent);}
  .preset-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .preset-btns button{font-size:12px;font-weight:600;color:var(--ink);background:var(--paper);border:1px solid var(--hair);
    border-radius:999px;padding:6px 12px;cursor:pointer;}
  .preset-btns button:hover{border-color:var(--accent);color:var(--accent);}
  .go{margin-left:auto;background:var(--accent);color:#fff;border:0;border-radius:9px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;}
  /* 상태 */
  .state{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px;}
  .spinner{width:26px;height:26px;border:3px solid var(--hair);border-top-color:var(--accent);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .err{background:var(--down-soft);color:var(--down);border-radius:10px;padding:16px;font-size:13px;}
  .period-label{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:18px;}
  .period-label b{color:var(--accent);}
  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px;}
  .kpi{background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:16px;}
  .kpi .k-label{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .kpi .k-now{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:-.02em;}
  .kpi .k-was{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:7px;}
  .delta{display:inline-flex;gap:3px;font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 7px;border-radius:999px;margin-top:9px;}
  .delta.good{color:var(--up);background:var(--up-soft);}.delta.bad{color:var(--down);background:var(--down-soft);}
  h2.sec{font-size:17px;font-weight:700;margin:32px 0 14px;}
  /* 퍼널 */
  .funnel{background:var(--surface);border:1px solid var(--hair);border-radius:16px;padding:22px;}
  .stage{margin-bottom:16px;}.stage:last-child{margin-bottom:0;}
  .stage-top{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;}
  .stage-name{font-weight:600;}.stage-conv{font-family:var(--mono);font-size:12px;color:var(--muted);}
  .stage-conv b{color:var(--accent);}.stage-conv .w{color:var(--down);}
  .bars{display:grid;gap:4px;}
  .bar-row{display:flex;align-items:center;gap:10px;}.bar-tag{width:22px;font-size:11px;color:var(--muted);text-align:right;}
  .bar-track{flex:1;background:var(--paper);border-radius:6px;height:24px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:9px;
    color:#fff;font-family:var(--mono);font-size:12px;min-width:56px;transition:width .8s ease;}
  .bar-fill.b{background:var(--ghost);color:var(--ink);}.bar-fill.a{background:var(--accent);}
  /* 페이지/슬롯 테이블 */
  .pages{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .page{background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:18px;}
  .page-name{font-size:14px;font-weight:700;margin-bottom:12px;}
  .m-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:8px 0;border-top:1px solid var(--hair);align-items:center;}
  .m-row:first-of-type{border-top:none;}.m-label{font-size:13px;}
  .m-vals{font-family:var(--mono);font-size:13px;color:var(--muted);text-align:right;}.m-vals b{color:var(--ink);}
  .m-delta{font-family:var(--mono);font-size:11px;font-weight:600;text-align:right;min-width:52px;}
  .m-delta.good{color:var(--up);}.m-delta.bad{color:var(--down);}
  table.slot{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--hair);border-radius:12px;overflow:hidden;}
  table.slot th,table.slot td{text-align:left;padding:10px 14px;font-size:13px;border-bottom:1px solid var(--hair);}
  table.slot th{background:var(--paper);color:var(--muted);font-weight:600;font-size:12px;}
  table.slot td.num{font-family:var(--mono);text-align:right;}
  table.slot a{color:var(--accent);text-decoration:none;word-break:break-all;}
  .slot-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .hide{display:none;}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr);}.pages,.slot-cols{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-rule"></div>
  <p class="eyebrow">PrintBakery Analytics</p>
  <h1>리뉴얼 · 슬롯 성과 대시보드</h1>

  <div class="tabs">
    <button class="tab active" data-tab="renewal">① 리뉴얼 전/후 성과</button>
    <button class="tab" data-tab="slots">② 메인 슬롯 이동 (art·life)</button>
  </div>

  <div class="controls">
    <div class="ctrl"><label>리뉴얼 전 (before)</label><div class="pair"><span class="seg b">전</span>
      <input type="date" id="bs"><span>~</span><input type="date" id="be"></div></div>
    <div class="ctrl"><label>리뉴얼 후 (after)</label><div class="pair"><span class="seg a">후</span>
      <input type="date" id="as"><span>~</span><input type="date" id="ae"></div></div>
    <button class="go" id="go">조회</button>
    <div class="ctrl" style="flex-basis:100%;"><label>빠른 선택</label><div class="preset-btns" id="presets"></div></div>
  </div>

  <div id="content"><div class="state"><div class="spinner"></div>데이터 불러오는 중…</div></div>
</div>

<script>
const WORKER="https://proud-sea-35f9.sugim-386.workers.dev";
const $=(id)=>document.getElementById(id);
const nf=new Intl.NumberFormat('ko-KR');
const fmt=(v)=>nf.format(v||0);
const delta=(b,a)=>{const p=b===0?0:((a-b)/b*100);return{text:(p>0?'+':'')+p.toFixed(1)+'%',good:a>=b};};

let TAB='renewal';
function iso(d){return d.toISOString().slice(0,10);}
function addDays(base,n){const d=new Date(base);d.setDate(d.getDate()+n);return d;}

// 기본 기간: 리뉴얼 전후
function setDates(bs,be,as,ae){$('bs').value=bs;$('be').value=be;$('as').value=as;$('ae').value=ae;}
setDates('2026-06-24','2026-06-30','2026-07-01','2026-07-07');

// 빠른 선택 버튼
const PRESETS=[
  {label:'리뉴얼 전후',fn:()=>setDates('2026-06-24','2026-06-30','2026-07-01','2026-07-07')},
  {label:'최근 7일',fn:()=>{const y=addDays(new Date(),-1);setDates(iso(addDays(y,-13)),iso(addDays(y,-7)),iso(addDays(y,-6)),iso(y));}},
  {label:'최근 28일',fn:()=>{const y=addDays(new Date(),-1);setDates(iso(addDays(y,-55)),iso(addDays(y,-28)),iso(addDays(y,-27)),iso(y));}},
  {label:'지난달 vs 이번달',fn:()=>{const n=new Date();const ts=new Date(n.getFullYear(),n.getMonth(),1);const ps=new Date(n.getFullYear(),n.getMonth()-1,1);setDates(iso(ps),iso(addDays(ts,-1)),iso(ts),iso(addDays(new Date(),-1)));}},
];
$('presets').innerHTML=PRESETS.map((p,i)=>`<button data-i="${i}">${p.label}</button>`).join('');
$('presets').addEventListener('click',(e)=>{const i=e.target.dataset.i;if(i!=null){PRESETS[i].fn();load();}});

// 탭 전환
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');TAB=t.dataset.tab;load();
}));
$('go').addEventListener('click',load);

function q(){return `bs=${$('bs').value}&be=${$('be').value}&as=${$('as').value}&ae=${$('ae').value}`;}
function showLoading(){$('content').innerHTML='<div class="state"><div class="spinner"></div>데이터 불러오는 중…</div>';}
function showErr(m){$('content').innerHTML=`<div class="err">데이터를 불러오지 못했습니다.<br>${m}<br><br>잠시 후 [조회]를 다시 눌러보세요.</div>`;}

async function load(){
  showLoading();
  try{
    const url=WORKER+'/?'+q()+(TAB==='slots'?'&tab=slots':'');
    const r=await fetch(url);
    const d=await r.json();
    if(d.error){showErr(d.error);return;}
    TAB==='slots'?renderSlots(d):renderRenewal(d);
  }catch(e){showErr(String(e));}
}

function periodLabel(d){return `<div class="period-label">비교 기간 &nbsp; <b>전</b> ${d.periodBefore} &nbsp;→&nbsp; <b>후</b> ${d.periodAfter}</div>`;}

function renderRenewal(d){
  let h=periodLabel(d);
  // KPI
  h+='<div class="kpis">'+d.kpis.map(k=>{const x=delta(k.before,k.after);
    return `<div class="kpi"><div class="k-label">${k.label}</div><div class="k-now">${fmt(k.after)}</div>
    <div class="delta ${x.good?'good':'bad'}">${x.good?'▲':'▼'} ${x.text}</div><div class="k-was">전: ${fmt(k.before)}</div></div>`;
  }).join('')+'</div>';
  // 퍼널
  h+='<h2 class="sec">구매 전환 퍼널</h2><div class="funnel">';
  const tB=d.funnel[0].before,tA=d.funnel[0].after;
  h+=d.funnel.map((s,i)=>{const p=d.funnel[i-1];
    const cB=p?(s.before/p.before*100):100,cA=p?(s.after/p.after*100):100,dd=p?cA-cB:0,cls=dd<0?'w':'';
    const conv=p?`<span class="stage-conv">통과율 ${cB.toFixed(1)}% → <b class="${cls}">${cA.toFixed(1)}%</b> <span class="${cls}">(${dd>=0?'+':''}${dd.toFixed(1)}%p)</span></span>`:`<span class="stage-conv">유입 100%</span>`;
    return `<div class="stage"><div class="stage-top"><span class="stage-name">${s.name}</span>${conv}</div><div class="bars">
      <div class="bar-row"><span class="bar-tag">전</span><div class="bar-track"><div class="bar-fill b" style="width:${Math.max(s.before/tB*100,7)}%">${fmt(s.before)}</div></div></div>
      <div class="bar-row"><span class="bar-tag">후</span><div class="bar-track"><div class="bar-fill a" style="width:${Math.max(s.after/tA*100,7)}%">${fmt(s.after)}</div></div></div>
    </div></div>`;
  }).join('')+'</div>';
  // 페이지
  h+='<h2 class="sec">페이지별 트래픽</h2><div class="pages">'+d.pages.map(pg=>{
    const rows=pg.metrics.map(m=>{const x=delta(m.before,m.after);
      return `<div class="m-row"><span class="m-label">${m.label}</span><span class="m-vals">${fmt(m.before)} → <b>${fmt(m.after)}</b></span>
      <span class="m-delta ${x.good?'good':'bad'}">${x.good?'▲':'▼'} ${x.text}</span></div>`;}).join('');
    return `<div class="page"><div class="page-name">${pg.name}</div>${rows}</div>`;
  }).join('')+'</div>';
  $('content').innerHTML=h;
}

function slotTable(list){
  if(!list||!list.length)return '<div class="state">이동 데이터 없음</div>';
  return '<table class="slot"><tr><th>목적지</th><th style="text-align:right;">이동 세션</th></tr>'+
    list.map(x=>`<tr><td><a href="https://printbakery.com${x.path}" target="_blank">${x.path}</a></td><td class="num">${fmt(x.sessions)}</td></tr>`).join('')+'</table>';
}
function renderSlots(d){
  let h=periodLabel(d);
  h+='<p style="font-size:13px;color:var(--muted);margin:0 0 18px;">각 메인(art·life)에서 클릭해 넘어간 목적지를 이동 세션 많은 순으로 보여줍니다. 리뉴얼 후(after) 기간 기준.</p>';
  ['art.html','life.html'].forEach(k=>{
    const s=d.slots[k]||{};
    h+=`<h2 class="sec">${k} 메인에서의 이동 (상위 30)</h2>`;
    h+=`<div class="slot-cols"><div><div class="period-label"><b>전</b> ${d.periodBefore}</div>${slotTable(s.before)}</div>
      <div><div class="period-label"><b>후</b> ${d.periodAfter}</div>${slotTable(s.after)}</div></div>`;
  });
  $('content').innerHTML=h;
}

load();
</script>
</body>
</html>
